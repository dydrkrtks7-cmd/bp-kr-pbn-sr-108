<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="782" cy="712" r="63" fill="#1a1a2e" opacity="0.20"/>
    <circle cx="368" cy="17" r="65" fill="#1a1a2e" opacity="0.15"/>
    <circle cx="61" cy="712" r="37" fill="#1a1a2e" opacity="0.05"/>
    <circle cx="1077" cy="650" r="21" fill="#1a1a2e" opacity="0.11"/>
    <circle cx="154" cy="219" r="82" fill="#1a1a2e" opacity="0.20"/>
    <circle cx="876" cy="344" r="28" fill="#1a1a2e" opacity="0.06"/>
    <rect x="331" y="482" width="61" height="39" rx="8" fill="#0a0a0a" opacity="0.03" transform="rotate(42, 85, 64)"/>
    <rect x="758" y="713" width="42" height="76" rx="8" fill="#0a0a0a" opacity="0.09" transform="rotate(27, 512, 417)"/>
    <rect x="870" y="182" width="96" height="73" rx="8" fill="#0a0a0a" opacity="0.08" transform="rotate(31, 388, 677)"/>
    <rect x="972" y="701" width="80" height="73" rx="8" fill="#0a0a0a" opacity="0.03" transform="rotate(25, 1073, -81)"/>
    <rect x="462" y="255" width="90" height="61" rx="8" fill="#0a0a0a" opacity="0.08" transform="rotate(15, 975, 9)"/>
    <rect x="968" y="-15" width="85" height="42" rx="8" fill="#0a0a0a" opacity="0.06" transform="rotate(29, 639, 377)"/>
    <rect x="329" y="-43" width="91" height="97" rx="8" fill="#0a0a0a" opacity="0.05" transform="rotate(22, -82, 156)"/>
    <rect x="412" y="689" width="96" height="30" rx="8" fill="#0a0a0a" opacity="0.09" transform="rotate(34, 570, -39)"/>
    <polygon points="1080,230 1164,398 996,398" fill="#1a1a2e" opacity="0.03"/>
    <polygon points="492,95 518,147 466,147" fill="#1a1a2e" opacity="0.05"/>
    <polygon points="488,257 552,385 424,385" fill="#1a1a2e" opacity="0.03"/>
    <polygon points="70,263 108,339 32,339" fill="#1a1a2e" opacity="0.13"/>

  <!-- Wave at bottom -->
  <path d="M0,554 C360,592 840,516 1200,554 L1200,630 L0,630Z" fill="#1a1a2e" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    을지로 클럽 솔직후기
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    을지로 — 클럽
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#7c3aed" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    을지로 을지로 클럽 솔직후기 — 클럽
  </text>
</svg>